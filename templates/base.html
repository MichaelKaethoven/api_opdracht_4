<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}HouseYourWine{% endblock %} 🍷</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header>
    <nav class="navbar">
      <a class="navbar-brand" href="{{ url_for('wines_list') }}">
        <span class="brand-icon">🍷</span>
        <span class="brand-name">HouseYourWine</span>
      </a>
      <ul class="nav-links">
        <li>
          <a
            href="{{ url_for('wines_list') }}"
            class="nav-link{% if request.endpoint == 'wines_list' %} active{% endif %}"
          >Wijnen</a>
        </li>
        <li>
          <a
            href="{{ url_for('countries_list') }}"
            class="nav-link{% if request.endpoint == 'countries_list' %} active{% endif %}"
          >Landen</a>
        </li>
      </ul>
    </nav>
  </header>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>&copy; {{ 2025 }} <strong>HouseYourWine</strong> — Curated wine selection</p>
  </footer>
</body>
</html>
